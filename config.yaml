# Paper / UAT configuration.
# mode=uat_confirm + confirmation_mode=auto places real (paper-account) orders
# without a manual gate. Before any real capital: flip confirmation_mode back
# to `confirm` and pass the Phase 5 go/no-go.
runtime:
  mode: uat_confirm             # offline_replay | shadow | uat_confirm | prod_confirm | prod_auto
  environment: uat              # uat | prod
  region: US
  account_ids:
    - ACC001
  confirmation_mode: auto       # auto | confirm | skip

risk:
  max_notional_usd: 10000
  max_quantity: 1000
  max_concentration_pct: 10.0
  symbol_whitelist:
    - AAPL
    - TSLA

portfolio:
  sizing_basis: portfolio_equity
  buying_power_buffer: 0.98
  price_slippage_buffer_pct: 0.5
  rounding_mode: floor
  fractional_shares_enabled: false
  min_residual_notional_usd: 25
  require_reconcile_before_sizing: true
